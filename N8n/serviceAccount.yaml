apiVersion: v1
kind: ServiceAccount
metadata:
  name: n8n
  namespace: n8n

---

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tailscale-secret-access
  namespace: n8n

rules:
- apiGroups: [""]
  resources:
  - secrets
  resourceNames:
  - tailscale
  verbs:
  - get
  - create
  - update
  - patch

- apiGroups: [""]
  resources:
  - events
  verbs:
  - get
  - create
  - patch

---

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tailscale-secret-access
  namespace: n8n

subjects:
- kind: ServiceAccount
  name: n8n
  namespace: n8n

roleRef:
  kind: Role
  name: tailscale-secret-access
  apiGroup: rbac.authorization.k8s.io