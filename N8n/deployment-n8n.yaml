apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  namespace: n8n

spec:
  replicas: 1

  selector:
    matchLabels:
      app: n8n

  template:
    metadata:
      labels:
        app: n8n

    spec:
      serviceAccountName: n8n
      terminationGracePeriodSeconds: 30

      initContainers:
      - name: wait-for-postgres
        image: busybox
        command:
        - sh
        - -c
        - until nc -z postgres 5432; do echo "waiting for postgres"; sleep 2; done

      containers:

      # =========================
      # N8N CONTAINER
      # =========================
      - name: n8n
        image: n8nio/n8n:2.17.2
        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 5678

        env:

        # ===== URL / HTTPS CONFIG =====
        - name: N8N_PROTOCOL
          value: https

        - name: N8N_HOST
          value: n8n.local.com

        - name: N8N_EDITOR_BASE_URL
          value: https://n8n.local.com

        - name: WEBHOOK_URL
          value: https://n8n.local.com/

        - name: N8N_SECURE_COOKIE
          value: "true"

        # ===== DB CONFIG =====
        - name: DB_TYPE
          value: postgresdb

        - name: DB_POSTGRESDB_HOST
          value: postgres

        - name: DB_POSTGRESDB_PORT
          value: "5432"

        - name: DB_POSTGRESDB_DATABASE
          valueFrom:
            secretKeyRef:
              name: n8n-secrets
              key: postgres-db

        - name: DB_POSTGRESDB_USER
          valueFrom:
            secretKeyRef:
              name: n8n-secrets
              key: postgres-user

        - name: DB_POSTGRESDB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: n8n-secrets
              key: postgres-password

        # ===== SECURITY =====
        - name: N8N_ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: n8n-secrets
              key: n8n-encryption-key

        - name: N8N_RUNNERS_ENABLED
          value: "true"

        - name: N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS
          value: "true"

        envFrom:
        - configMapRef:
            name: n8n-config

        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 2
            memory: 4Gi

        startupProbe:
          httpGet:
            path: /healthz
            port: 5678
          failureThreshold: 30
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /healthz
            port: 5678
          initialDelaySeconds: 30
          periodSeconds: 10

        livenessProbe:
          httpGet:
            path: /healthz
            port: 5678
          initialDelaySeconds: 60
          periodSeconds: 20

        securityContext:
          runAsUser: 1000
          runAsNonRoot: true
          allowPrivilegeEscalation: false

        volumeMounts:
        - name: n8n-data
          mountPath: /home/node/.n8n


      # =========================
      # TAILSCALE SIDECAR
      # =========================
      - name: tailscale
        image: tailscale/tailscale:stable
        imagePullPolicy: IfNotPresent

        securityContext:
          privileged: true
          capabilities:
            add:
            - NET_ADMIN

        env:
        - name: TS_AUTHKEY
          valueFrom:
            secretKeyRef:
              name: n8n-secrets
              key: tailscale-auth-key

        - name: TS_STATE_DIR
          value: /var/lib/tailscale

        - name: TS_USERSPACE
          value: "true"

        # importante para persistência no cluster
        - name: TS_KUBE_SECRET
          value: tailscale

        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name

        - name: POD_UID
          valueFrom:
            fieldRef:
              fieldPath: metadata.uid

        volumeMounts:
        - name: tailscale-state
          mountPath: /var/lib/tailscale


      volumes:

      - name: n8n-data
        persistentVolumeClaim:
          claimName: n8n-pvc

      - name: tailscale-state
        emptyDir: {}