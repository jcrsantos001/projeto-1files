apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  namespace: n8n

spec:
  serviceAccountName: n8n
  replicas: 1

  selector:
    matchLabels:
      app: n8n

  template:
    metadata:
      labels:
        app: n8n

    spec:
      terminationGracePeriodSeconds: 30

      initContainers:
      - name: wait-for-postgres
        image: busybox
        command:
        - sh
        - -c
        - until nc -z postgres 5432; do echo "waiting for postgres"; sleep 2; done

      containers:

      - name: n8n
        image: n8nio/n8n:1.84.1
        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 5678

        env:
        - name: DB_TYPE
          value: postgresdb

        - name: DB_POSTGRESDB_HOST
          value: postgres

        - name: DB_POSTGRESDB_PORT
          value: "5432"

        - name: DB_POSTGRESDB_DATABASE
          valueFrom:
            secretKeyRef:
              name: n8n-secrets
              key: postgres-db

        - name: DB_POSTGRESDB_USER
          valueFrom:
            secretKeyRef:
              name: n8n-secrets
              key: postgres-user

        - name: DB_POSTGRESDB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: n8n-secrets
              key: postgres-password

        - name: N8N_ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: n8n-secrets
              key: n8n-encryption-key

        envFrom:
        - configMapRef:
            name: n8n-config

        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 2
            memory: 4Gi

        startupProbe:
          httpGet:
            path: /healthz
            port: 5678
          failureThreshold: 30
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /healthz
            port: 5678
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5

        livenessProbe:
          httpGet:
            path: /healthz
            port: 5678
          initialDelaySeconds: 60
          periodSeconds: 20
          timeoutSeconds: 5

        securityContext:
          runAsUser: 1000
          runAsNonRoot: true
          allowPrivilegeEscalation: false

        volumeMounts:
        - name: n8n-data
          mountPath: /home/node/.n8n


      - name: tailscale
        image: tailscale/tailscale:stable
        imagePullPolicy: IfNotPresent

        securityContext:
          privileged: true
          capabilities:
            add:
            - NET_ADMIN

        env:
        - name: TS_AUTHKEY
          valueFrom:
            secretKeyRef:
              name: n8n-secrets
              key: tailscale-auth-key

        - name: TS_STATE_DIR
          value: /var/lib/tailscale

        - name: TS_USERSPACE
          value: "true"

        volumeMounts:
        - name: tailscale-state
          mountPath: /var/lib/tailscale


      volumes:

      - name: n8n-data
        persistentVolumeClaim:
          claimName: n8n-pvc

      - name: tailscale-state
        emptyDir: {}